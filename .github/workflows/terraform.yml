name: "SecOps Swarm: GitOps Remediation CI/CD"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write # Required to post plan output comments on Pull Requests
  pull-requests: write

jobs:
  terraform:
    name: "Terraform GitOps Pipeline"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      # 1. Checkout repository source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Terraform CLI environment
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # 3. Initialize working directory (child modules and providers)
      - name: Terraform Init
        run: terraform init

      # 4. Enforce standard HCL formatting rules
      - name: Terraform Format Check
        run: terraform fmt -check

      # 5. Validate structural syntax rules
      - name: Terraform Validate
        run: terraform validate

      # 6. Generate execution plan (Dry-Run check on PRs)
      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        id: plan
        run: terraform plan -no-color
        continue-on-error: true

      # 7. Post Plan details directly to the Pull Request for SRE audit trail
      - name: Post Plan to Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          ACTION_EVENT: ${{ github.event_name }}
          PUSHED_BY: ${{ github.actor }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = [
              '#### Terraform Plan Dry-Run Result',
              `* **Status**: \`${process.env.PLAN_OUTCOME}\``,
              `* **Action Event**: \`${process.env.ACTION_EVENT}\``,
              '',
              '<details><summary>Show Full Execution Plan</summary>',
              '',
              '```hcl',
              process.env.PLAN_STDOUT || 'No Terraform plan output was captured.',
              '```',
              '',
              '</details>',
              '',
              `*Pushed by: @${process.env.PUSHED_BY}*`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      # 8. Hard fail the pipeline if the plan execution failed
      - name: Verify Plan Outcome
        if: github.event_name == 'pull_request' && steps.plan.outcome == 'failure'
        run: exit 1

      # 9. Deploy auto-remediation updates on PR merge to main branch
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
